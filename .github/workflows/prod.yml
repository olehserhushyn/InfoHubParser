name: RSS to Discord Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run RSS sync bot
        env:
          DISCORD_WEBHOOK_DAILY_DIGESTS: ${{ secrets.DISCORD_WEBHOOK_DAILY_DIGESTS }}
          DISCORD_WEBHOOK_CSHARP_DOTNET: ${{ secrets.DISCORD_WEBHOOK_CSHARP_DOTNET }}
          DISCORD_WEBHOOK_ARCHITECTURE_SYSTEMS: ${{ secrets.DISCORD_WEBHOOK_ARCHITECTURE_SYSTEMS }}
          DATABASE_PATH: news.db
        run: dotnet run --project InfoHubParser/InfoHubParser.csproj

      - name: Commit and Push news.db changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.db
          # Only commit if there are changes to news.db
          if ! git diff --cached --quiet; then
            git commit -m "chore: update database [skip ci]"
            for i in {1..3}; do
              git pull --rebase origin ${{ github.ref_name }} || true
              if git push; then
                echo "Successfully pushed database changes."
                break
              fi
              echo "Push failed, retrying in 3 seconds..."
              sleep 3
            done
          else
            echo "No database changes to commit."
          fi
